<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Downloader</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 50px;
}

.container {
  background: #1e293b;
  padding: 30px;
  border-radius: 15px;
  max-width: 400px;
  margin: auto;
}

input {
  width: 90%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-top: 15px;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  margin-top: 15px;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

.result {
  margin-top: 20px;
}
</style>

</head>
<body>

<div class="container">
  <h2>🎬 تحميل الفيديو</h2>
  <p>الصق رابط الفيديو هنا</p>

  <input type="text" id="url" placeholder="ضع الرابط هنا...">
  <br>
  <button onclick="download()">تحميل</button>

  <div class="result" id="result"></div>
</div>

<script>
function download() {
  let url = document.getElementById("url").value;

  if (!url) {
    alert("ضع رابط أولاً");
    return;
  }

  // موقع API مجاني للتجربة
  let api = "https://api.vevioz.com/api/button/mp4?url=" + encodeURIComponent(url);

  document.getElementById("result").innerHTML =
    `<p>اضغط للتحميل 👇</p>
     <a href="${api}" target="_blank">
       <button>تحميل الفيديو</button>
     </a>`;
}
</script>

</body>
</html>
