<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحميل الفيديو</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    text-align: center;
}

.container {
    margin-top: 80px;
    background: #1e293b;
    padding: 30px;
    border-radius: 20px;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h1 {
    margin-bottom: 10px;
}

input {
    width: 90%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 15px;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 12px;
    background: #22c55e;
    color: white;
    margin-top: 15px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #16a34a;
}

.result {
    margin-top: 20px;
}
</style>

</head>

<body>

<div class="container">
    <h1>🎬 تحميل الفيديو</h1>
    <p>الصق رابط YouTube هنا</p>

    <input type="text" id="url" placeholder="https://youtube.com/...">

    <br>
    <button onclick="downloadVideo()">تحميل الفيديو</button>
    <button onclick="downloadMP3()">تحميل MP3</button>

    <div class="result" id="result"></div>
</div>

<script>
function extractID(url) {
    let regExp = /(?:youtube\.com.*(?:\?|&)v=|youtu\.be\/)([^&]+)/;
    let match = url.match(regExp);
    return match ? match[1] : null;
}

function downloadVideo() {
    let url = document.getElementById("url").value;
    let id = extractID(url);

    if (!id) {
        alert("رابط غير صحيح!");
        return;
    }

    window.open("https://ssyoutube.com/watch?v=" + id);
}

function downloadMP3() {
    let url = document.getElementById("url").value;
    let id = extractID(url);

    if (!id) {
        alert("رابط غير صحيح!");
        return;
    }

    window.open("https://ytmp3.nu/en/?url=https://www.youtube.com/watch?v=" + id);
}
</script>

</body>
</html>
